name: Actualizar contratos diariamente

on:
  # Reactivado el 2026-07-23: estuvo pausado desde el 2026-07-22 ~21:10 UTC
  # por el bug de refresco sustitutivo (_db_set_municipio sobrescribía en
  # vez de fusionar con lo ya guardado, borró histórico de Archena). El
  # refresco aditivo (_fusionar_historico_contratos, commits 241447b +
  # c17a6c8) ya está verificado en local y confirmado en producción -- ver
  # INFORME_NOCHE.md -- así que el cron ya no puede repetir aquel borrado.
  schedule:
    # 04:00 UTC ≈ 05:00–06:00 hora de España (invierno/verano). Hora de bajo
    # tráfico tanto en la web como en PLACE/BORM.
    - cron: "0 4 * * *"
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar refresco completo (Murcia + Girona, 266 municipios) en producción
        run: |
          respuesta=$(curl -s -w "\n%{http_code}" -X POST \
            -d "token=${{ secrets.ADMIN_TOKEN }}" \
            -d "provincia=todas" \
            https://dinero-publico.onrender.com/actualizar-todos)
          codigo=$(echo "$respuesta" | tail -n1)
          cuerpo=$(echo "$respuesta" | sed '$d')
          echo "HTTP $codigo"
          echo "$cuerpo"
          if [ "$codigo" != "200" ]; then
            echo "::error::El endpoint /actualizar-todos devolvió $codigo"
            exit 1
          fi

      - name: Disparar refresco de fondos UE (CORDIS + Cohesion Data) en producción
        run: |
          respuesta=$(curl -s -w "\n%{http_code}" -X POST \
            -d "token=${{ secrets.ADMIN_TOKEN }}" \
            https://dinero-publico.onrender.com/actualizar-fondos-ue)
          codigo=$(echo "$respuesta" | tail -n1)
          cuerpo=$(echo "$respuesta" | sed '$d')
          echo "HTTP $codigo"
          echo "$cuerpo"
          if [ "$codigo" != "200" ]; then
            echo "::error::El endpoint /actualizar-fondos-ue devolvió $codigo"
            exit 1
          fi
