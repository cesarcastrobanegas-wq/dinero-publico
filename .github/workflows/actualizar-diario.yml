name: Actualizar contratos diariamente

on:
  # ⚠️ PAUSADO A MANO el 2026-07-22 ~21:10 UTC: el refresco de contratos es
  # SUSTITUTIVO en vez de ADITIVO (_db_set_municipio sobrescribe en vez de
  # fusionar con lo ya guardado) y ha borrado histórico de al menos Archena
  # cuando faltaban ZIPs antiguos en place_cache/ en el momento del refresco.
  # Con el cron activo, la próxima ejecución (04:00 UTC) habría lanzado
  # /actualizar-todos con provincia=todas -- los 266 municipios de golpe --
  # arriesgando perder histórico judicialmente relevante a gran escala. NO
  # reactivar el "schedule:" hasta que el refresco aditivo esté desplegado y
  # verificado en producción (ver INFORME_NOCHE.md 2026-07-22, sección del
  # bug de refresco sustitutivo). workflow_dispatch se deja activo para
  # poder disparar el cron a mano una vez resuelto.
  # schedule:
  #   - cron: "0 4 * * *"
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar refresco completo (Murcia + Girona, 266 municipios) en producción
        run: |
          respuesta=$(curl -s -w "\n%{http_code}" -X POST \
            -d "token=${{ secrets.ADMIN_TOKEN }}" \
            -d "provincia=todas" \
            https://dinero-publico.onrender.com/actualizar-todos)
          codigo=$(echo "$respuesta" | tail -n1)
          cuerpo=$(echo "$respuesta" | sed '$d')
          echo "HTTP $codigo"
          echo "$cuerpo"
          if [ "$codigo" != "200" ]; then
            echo "::error::El endpoint /actualizar-todos devolvió $codigo"
            exit 1
          fi

      - name: Disparar refresco de fondos UE (CORDIS + Cohesion Data) en producción
        run: |
          respuesta=$(curl -s -w "\n%{http_code}" -X POST \
            -d "token=${{ secrets.ADMIN_TOKEN }}" \
            https://dinero-publico.onrender.com/actualizar-fondos-ue)
          codigo=$(echo "$respuesta" | tail -n1)
          cuerpo=$(echo "$respuesta" | sed '$d')
          echo "HTTP $codigo"
          echo "$cuerpo"
          if [ "$codigo" != "200" ]; then
            echo "::error::El endpoint /actualizar-fondos-ue devolvió $codigo"
            exit 1
          fi
